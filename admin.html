<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AgaTube - Yönetim Paneli</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background: #222; }
        button { background: #cc0000; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Telif Hakkı Bildirimleri</h2>
    <table>
        <thead>
            <tr>
                <th>Video Adı</th>
                <th>Şikayet Eden</th>
                <th>Gerekçe</th>
                <th>İşlem</th>
            </tr>
        </thead>
        <tbody id="reportTableBody">
            <!-- Raporlar buraya listelenecek -->
        </tbody>
    </table>

    <hr style="margin: 30px 0; border-color: #333;">

<h2>📢 Güncelleme Notu Ekle</h2>
<div style="display: flex; flex-direction: column; gap: 10px; max-width: 500px;">
    <input type="text" id="noteTitle" placeholder="Güncelleme Başlığı (Örn: v1.1 - Likelar ve Yorumlar Geldi!)" style="padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 4px;">
    <textarea id="noteContent" placeholder="Güncelleme detaylarını yazın..." rows="4" style="padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 4px;"></textarea>
    <button id="addNoteBtn" style="background: #28a745; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold;">Notu Yayınla</button>
</div>

<h3>Yayınlanmış Güncelleme Notları</h3>
<ul id="adminNotesList" style="list-style: none; padding: 0;">
    <!-- Notlar buraya listelenecek -->
</ul>

    <script type="module" src="admin.js"></script>
</body>
</html>
