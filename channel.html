<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgaTube - Kanal Sayfası</title>
    <link rel="stylesheet" href="channel.css">
</head>
<body>
    <header style="padding: 10px 20px; display: flex; align-items: center; gap: 15px; background: #181818; border-bottom: 1px solid #282828;">
        <button id="anasayfab" onclick="window.location.href='index.html'" style="padding: 8px 14px; background: #272727; color: white; border: 1px solid #3a3a3a; border-radius: 6px; cursor: pointer;">
            ← Ana Sayfa
        </button>
        <h1 id="channelTitle" style="margin: 0; font-size: 18px; color: #fff;">AgaTube</h1>
    </header>

    <main>
        <!-- 1. ÜST ALAN: BANNER -->
        <div id="channelBanner" style="width: 100%; height: 180px; background: #1a1a1a; background-size: cover; background-position: center; position: relative;">
            <label id="uploadBannerBtn" for="bannerInput" style="display: none; position: absolute; right: 15px; bottom: 15px; background: rgba(0,0,0,0.7); color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; border: 1px solid #444;">
                📷 Banner Değiştir
            </label>
            <input type="file" id="bannerInput" accept="image/*" style="display: none;">
        </div>

        <!-- 2. ÜST ALAN: KANAL BİLGİLERİ (İsim, Avatar, Butonlar) -->
        <div class="channel-header" style="padding: 20px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #282828; background: #0f0f0f;">
            
            <!-- PROFİL FOTOĞRAFI -->
            <div id="avatarContainer" style="width: 80px; height: 80px; border-radius: 50%; background: #222; overflow: hidden; position: relative; flex-shrink: 0;">
                <img id="channelAvatar" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                
                <label id="uploadAvatarBtn" for="avatarInput" style="display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); color: white; justify-content: center; align-items: center; cursor: pointer; font-size: 11px;">
                    Fotoğraf
                </label>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            </div>

            <!-- KANAL ADI VE AÇIKLAMASI -->
            <div style="flex-grow: 1;">
                <h1 id="channelName" style="margin: 0; font-size: 24px; color: #fff;">Yükleniyor...</h1>
                
                <!-- AÇIKLAMA VE DÜZENLE BUTONU -->
                <div style="display: flex; align-items: center; gap: 10px; margin: 5px 0;">
                    <p id="channelBio" style="margin: 0; color: #aaa; font-size: 14px;">Açıklama yok.</p>
                    <button id="editBioBtn" style="display: none; background: transparent; border: none; color: #3ea6ff; cursor: pointer; font-size: 13px; text-decoration: underline;">
                        ✏️ Düzenle
                    </button>
                </div>
                
                <!-- İSTATİSTİK & TEMA BUTONLARI -->
                <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                    <button id="showStatsBtn" style="background: #272727; color: white; border: 1px solid #3a3a3a; padding: 8px 14px; border-radius: 18px; cursor: pointer; font-size: 13px;">
                        📊 Kanal Verileri
                    </button>

                    <div id="colorPickerContainer" style="display: none; align-items: center; gap: 8px; background: #272727; padding: 4px 12px; border-radius: 18px; border: 1px solid #3a3a3a;">
                        <span style="font-size: 12px; color: #ccc;">Tema Rengi:</span>
                        <input type="color" id="themeColorPicker" value="#3ea6ff" style="border: none; width: 24px; height: 24px; cursor: pointer; background: transparent;">
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. ALT ALAN: VİDEOLAR -->
        <section style="padding: 20px;">
            <h2 style="color: #fff; margin-top: 0;">Videolar</h2>
            <div id="channelVideoContainer" class="video-grid"></div>
        </section>
    </main>

    <!-- İSTATİSTİK MODALI -->
    <div id="statsModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #212121; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #333;">
            <h3 style="margin-top: 0; color: #fff;">📈 Kanal İstatistikleri</h3>
            <hr style="border-color: #333; margin: 15px 0;">
            <p style="color: #ccc;">👥 <strong>Toplam Abone:</strong> <span id="statSubs" style="color: #fff;">0</span></p>
            <p style="color: #ccc;">👁️ <strong>Toplam İzlenme:</strong> <span id="statViews" style="color: #fff;">0</span></p>
            <p style="color: #ccc;">👍 <strong>Toplam Beğeni:</strong> <span id="statLikes" style="color: #fff;">0</span></p>
            <button id="closeStatsBtn" style="width: 100%; margin-top: 15px; padding: 10px; background: #3ea6ff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Kapat</button>
        </div>
    </div>

    <!-- SUPABASE VE JS BAĞLANTISI -->
    <script type="module" src="channel.js"></script>
</body>
</html>
