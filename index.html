<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgaTube</title>

    <link rel="stylesheet" href="index.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- YÜKLENİYOR EKRANI (LOADER) -->
<div id="loadingOverlay" class="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white; font-family: sans-serif;">
    <div class="spinner" style="border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #cc0000; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
    <h3 style="margin: 0;">Videonuz Yükleniyor...</h3>
    <p style="color: #aaa; margin-top: 5px;">Lütfen tarayıcıyı kapatmayın.</p>
</div>

<!-- Spinner Dönme Animasyonu İçin Küçük Bir Stil -->
<style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>


    <!-- HEADER -->
    <header>

        <div class="left-header">
            <h2 class="logo">
                <i class="fa-brands fa-youtube"></i>
                AgaTube
            </h2>
        </div>

        <div class="middle-header">
            <!-- 🚀 ID Değeri 'searchInput' olarak düzeltildi (index.js ile tam uyumlu) -->
            <input
                type="text"
                id="searchInput"
                placeholder="Video ara...">

            <button id="searchButton">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <div class="right-header">
            <button id="uploadButton">
                <i class="fa-solid fa-upload"></i>
                Upload
            </button>

            <input
                type="file"
                id="videoInput"
                accept="video/*"
                hidden>

            <span id="welcome"></span>
        </div>

    </header>

    <!-- SAYFA -->
    <div class="container">

        <!-- SOL MENÜ -->
        <aside>
            <button onclick="window.location.href='index.html'">
                <i class="fa-solid fa-house"></i>
                Ana Sayfa
            </button>

            <!-- SOL MENÜDEKİ BUTON -->
<button id="openUpdateNotesBtn" class="sidebar-item" style="display: flex; align-items: center; gap: 15px; width: 100%; padding: 10px 15px; background: transparent; border: none; color: white; cursor: pointer; font-size: 14px; border-radius: 8px; transition: background 0.2s;">
    <i class="fa-solid fa-bullhorn" style="font-size: 18px; color: #ffffff;"></i>
    <span>Güncelleme Notları</span>
</button>


<!-- AÇILACAK PENCERE (MODAL) -->
<div id="updateNotesModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: #212121; width: 90%; max-width: 500px; max-height: 80vh; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        
        <!-- Başlık ve Kapat Butonu -->
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #333; background: #181818;">
            <h3 style="margin: 0; color: #fff; font-size: 18px; display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-bullhorn" style="color: #3ea6ff;"></i> Güncelleme Notları
            </h3>
            <button id="closeUpdateNotesBtn" style="background: transparent; border: none; color: #aaa; font-size: 20px; cursor: pointer; padding: 0 5px;">&times;</button>
        </div>

        <!-- Not Listesi İçeriği -->
        <div id="modalUpdateNotesList" style="padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;">
            <!-- JavaScript burayı dolduracak -->
        </div>

    </div>
</div>

            <!-- 🚀 İkonun içindeki hatalı ikinci onclick temizlendi -->
            <button onclick="window.location.href='allchannels.html'">
                <i id="kanallarbuton" class="fa-solid fa-users"></i>
                Kanallar
            </button>

            <button>
                <i class="fa-solid fa-film"></i>
                Abonelikler
            </button>
        </aside>

        <!-- ANA İÇERİK -->
        <main>
            <div id="videoContainer"></div>
        </main>

    </div>

    <!-- UPLOAD MODAL -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2>Yeni Video Yükle</h2>

            <input
                type="text"
                id="videoTitleInput"
                placeholder="Video Başlığı">

            <textarea
                id="videoDescription"
                placeholder="Video Açıklaması"></textarea>

            <button id="chooseVideo">
                <i class="fa-solid fa-video"></i>
                Video Seç
            </button>

            <p id="selectedVideo">
                Henüz video seçilmedi.
            </p>

            <div class="modal-buttons">
                <button id="closeModal">İptal</button>
                <button id="uploadVideo">Yükle</button>
            </div>
        </div>
    </div>

    <!-- 🚀 Hata veren firebase.js kaldırıldı, sadece Supabase tabanlı index.js kaldı -->
    <script type="module" src="index.js"></script>

</body>
</html>
