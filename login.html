<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginPage</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <html src="index.html"></html>
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <div>
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="Username" class="input-field" required>
        </div>
        <div>
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" class="input-field" required>
           
        </div>
        

        <input type="checkbox" id="remember-me">
        <label for="remember-me">Remember Me</label>
          <button id="login-button">Login</button>
         <br>
        <a href="#" class="forgot-password">Forgot Password?</a>

       <a id="register-link" href="#" class="register-link">Don't have an account? Register</a>
      
    </div>
   
    <script type="module" src="script.js"></script>
</body>
</html>
