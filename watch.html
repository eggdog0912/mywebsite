<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgaTube - Video İzle</title>
    <link rel="stylesheet" href="watch.css">
    
    <!-- 🚀 Butondaki ünlem ikonunun görünmesi için Font Awesome eklendi -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<header>
    <h2 style="cursor: pointer;" onclick="window.location.href='index.html'">AgaTube</h2>
</header>

<main>
    <video id="watchVideo" controls></video>
    <h1 id="watchTitle"></h1>
    <h3 id="watchChannel"></h3>
    <p id="watchViews"></p>
    
    <!-- 🚀 Telif butonu main içerisine, bilgilerin hemen altına alındı -->
    <button id="reportCopyrightBtn" style="background-color: #cc0000; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px;">
        <i class="fa-solid fa-triangle-exclamation"></i> Telif Bildir
    </button>

    <hr>
    <p id="watchDescription"></p>
</main>

<!-- Beğenme ve Beğenmeme Buton Alanı -->
<div class="reaction-container" style="margin-top: 15px; display: flex; gap: 10px;">
    <button id="likeBtn" style="background-color: #272727; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 5px;">
        <i class="fa-solid fa-thumbs-up"></i> <span id="likeCount">0</span>
    </button>
    
    <button id="dislikeBtn" style="background-color: #272727; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 5px;">
        <i class="fa-solid fa-thumbs-down"></i> <span id="dislikeCount">0</span>
    </button>
</div>

<!-- Sadece video sahibine görünecek Silme Butonu -->
<button id="deleteMyVideoBtn" style="display: none; background-color: #333; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 8px 15px; border-radius: 4px; cursor: pointer;">
    <i class="fa-solid fa-trash-can"></i> Videomu Sil
</button>


<!-- Abone Ol ve Sayı Alanı -->
<div class="sub-container" style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
    <span id="subCount" style="color: #aaa; font-size: 14px;">0 abone</span>
    <button id="subscribeBtn" style="background-color: #cc0000; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
        Abone Ol
    </button>
</div>

<!-- 🚀 KRİTİK DÜZELTME: import yapısının çalışması için type="module" eklendi -->
<script type="module" src="watch.js"></script>

</body>
</html>
